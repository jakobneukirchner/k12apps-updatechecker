<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K12 Apps – Update</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    :root {
      --md-sys-color-primary: #006A6A;
      --md-sys-color-on-primary: #FFFFFF;
      --md-sys-color-primary-container: #9CF1F0;
      --md-sys-color-on-primary-container: #002020;
      --md-sys-color-secondary-container: #CCE8E7;
      --md-sys-color-on-secondary-container: #051F1F;
      --md-sys-color-surface: #F4FBFA;
      --md-sys-color-surface-container: #E8F2F1;
      --md-sys-color-on-surface: #161D1D;
      --md-sys-color-on-surface-variant: #3F4948;
      --md-sys-color-outline: #6F7979;
      --md-sys-color-error: #BA1A1A;
      --md-sys-color-error-container: #FFDAD6;
      --md-sys-color-on-error-container: #410002;
      --md-sys-color-tertiary-container: #C4EAB1;
      --md-sys-color-on-tertiary-container: #002204;
      --md-elevation-1: 0 1px 2px rgba(0,0,0,.12), 0 1px 3px rgba(0,0,0,.08);
      --md-elevation-2: 0 1px 2px rgba(0,0,0,.12), 0 2px 6px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--md-sys-color-surface-container);
      border-radius: 28px;
      max-width: 420px; width: 100%;
      box-shadow: var(--md-elevation-2);
      overflow: hidden;
    }
    .card-header {
      background: var(--md-sys-color-primary-container);
      padding: 28px 24px 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .app-icon-wrap {
      width: 56px; height: 56px; border-radius: 16px;
      background: var(--md-sys-color-primary);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .app-icon-wrap .material-icons { color: var(--md-sys-color-on-primary); font-size: 32px; }
    .card-header-text h1 { font-size: 1.375rem; font-weight: 700;
      color: var(--md-sys-color-on-primary-container); }
    .card-header-text p { font-size: .875rem; color: var(--md-sys-color-on-primary-container);
      opacity: .75; margin-top: 2px; }
    .card-body { padding: 20px 24px 24px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 999px;
      font-size: .8125rem; font-weight: 500; margin-bottom: 16px;
    }
    .badge .material-icons { font-size: 16px; }
    .badge.up-to-date { background: var(--md-sys-color-tertiary-container); color: var(--md-sys-color-on-tertiary-container); }
    .badge.update-available { background: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); }
    .badge.error-badge { background: var(--md-sys-color-error-container); color: var(--md-sys-color-on-error-container); }
    .badge.warn-badge { background: #FFF3CD; color: #7D5800; }
    .version-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
    .version-table td { padding: 8px 0; font-size: .9rem; }
    .version-table td:first-child { color: var(--md-sys-color-on-surface-variant); width: 55%; }
    .version-table tr { border-bottom: 1px solid rgba(0,0,0,.06); }
    .version-table tr:last-child { border-bottom: none; }
    .changelog-label { font-size: .75rem; font-weight: 500; letter-spacing: .06em;
      text-transform: uppercase; color: var(--md-sys-color-on-surface-variant); margin-bottom: 6px; }
    .changelog { background: var(--md-sys-color-surface); border-radius: 12px;
      padding: 12px 14px; font-size: .875rem; color: var(--md-sys-color-on-surface);
      line-height: 1.55; margin-bottom: 20px; border: 1px solid rgba(0,0,0,.06); }
    .btn-row { display: flex; flex-direction: column; gap: 10px; }
    .btn { display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px 24px; border-radius: 100px; border: none;
      font-family: 'Roboto', sans-serif; font-size: .9375rem; font-weight: 500;
      cursor: pointer; text-decoration: none; transition: opacity .15s; }
    .btn .material-icons { font-size: 20px; }
    .btn:hover { opacity: .88; }
    .btn-filled { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); box-shadow: var(--md-elevation-1); }
    .btn-tonal { background: var(--md-sys-color-secondary-container); color: var(--md-sys-color-on-secondary-container); }
    #downloadBtn { display: none; }
    .loading { display: flex; flex-direction: column; align-items: center; gap: 16px;
      padding: 32px 0; color: var(--md-sys-color-on-surface-variant); }
    .spinner { width: 36px; height: 36px;
      border: 3px solid var(--md-sys-color-primary-container);
      border-top-color: var(--md-sys-color-primary);
      border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Nicht-Android Banner */
    .not-android-body { padding: 24px; }
    .not-android-icon {
      width: 64px; height: 64px; border-radius: 20px;
      background: var(--md-sys-color-error-container);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .not-android-icon .material-icons { font-size: 36px; color: var(--md-sys-color-on-error-container); }
    .not-android-title { font-size: 1.25rem; font-weight: 700; text-align: center; margin-bottom: 8px; }
    .not-android-text { font-size: .9rem; color: var(--md-sys-color-on-surface-variant);
      text-align: center; line-height: 1.55; }
  </style>
</head>
<body>
<div class="card" id="mainCard">
  <div class="card-header">
    <div class="app-icon-wrap">
      <span class="material-icons" id="appIcon">apps</span>
    </div>
    <div class="card-header-text">
      <h1 id="appName">Update</h1>
      <p id="appSub">Update-Check</p>
    </div>
  </div>
  <div class="card-body" id="mainBody">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span>Suche nach Updates…</span>
    </div>
    <div id="content" style="display:none">
      <span class="badge" id="badge"></span>
      <table class="version-table">
        <tr><td>Installierte Version</td><td id="installedVer">–</td></tr>
        <tr><td>Aktuelle Version</td><td id="latestVer">–</td></tr>
      </table>
      <p class="changelog-label">Änderungen</p>
      <div class="changelog" id="changelog"></div>
      <div class="btn-row">
        <a id="downloadBtn" class="btn btn-filled" href="#">
          <span class="material-icons">download</span>APK herunterladen
        </a>
        <button id="closeBtn" class="btn btn-tonal" onclick="openApp()">
          <span class="material-icons">open_in_new</span>App öffnen
        </button>
      </div>
    </div>
    <div id="errorBox" style="display:none">
      <span class="badge error-badge">
        <span class="material-icons">error_outline</span>
        <span id="errorMsg"></span>
      </span>
      <div class="btn-row" style="margin-top:12px">
        <button class="btn btn-tonal" onclick="openApp()">
          <span class="material-icons">open_in_new</span>App öffnen
        </button>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  // ── Android-Check ─────────────────────────────────────────────────────
  const isAndroid = /android/i.test(navigator.userAgent);
  if (!isAndroid) {
    document.getElementById('mainBody').innerHTML = `
      <div class="not-android-body">
        <div class="not-android-icon">
          <span class="material-icons">smartphone</span>
        </div>
        <p class="not-android-title">Nur auf Android verfügbar</p>
        <p class="not-android-text">
          Diese Seite ist ausschließlich für Android-Geräte gedacht.<br>
          Öffne den Link auf deinem Android-Smartphone oder -Tablet.
        </p>
      </div>`;
    document.getElementById('loading') && (document.getElementById('loading').style.display = 'none');
    return;
  }

  // ── URL-Parameter parsen ──────────────────────────────────────────────
  const params = new URLSearchParams(location.search);
  let appKey = null;
  for (const [k, v] of params.entries()) { if (v === '' || v === 'true') { appKey = k; break; } }
  if (!appKey) appKey = [...params.keys()][0] ?? 'unknown';
  const installedVersion = params.get('v') ?? '0.0.0';
  const appName = appKey.charAt(0).toUpperCase() + appKey.slice(1);

  const icons = { hashi: 'hub' };
  document.getElementById('appIcon').textContent = icons[appKey.toLowerCase()] ?? 'apps';
  document.getElementById('appName').textContent = appName;

  const intentUrls = {
    hashi: 'intent://open#Intent;scheme=de.koblin12.hashi;package=de.koblin12.hashi;end'
  };
  window.openApp = function () {
    const url = intentUrls[appKey.toLowerCase()];
    if (url) location.href = url; else window.close();
  };

  function compareVersions(a, b) {
    const pa = String(a).split('.').map(Number);
    const pb = String(b).split('.').map(Number);
    const len = Math.max(pa.length, pb.length);
    for (let i = 0; i < len; i++) {
      const diff = (pa[i] ?? 0) - (pb[i] ?? 0);
      if (diff !== 0) return diff;
    }
    return 0;
  }

  fetch('/apps/' + appName + '/versions.json')
    .then(r => { if (!r.ok) throw new Error('Manifest nicht gefunden'); return r.json(); })
    .then(data => {
      const latest = String(data.latest);
      const meta   = data.versions.find(v => String(v.version) === latest) ?? data.versions[0];
      const newer  = compareVersions(latest, installedVersion) > 0;
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      document.getElementById('installedVer').textContent = 'v' + installedVersion;
      document.getElementById('latestVer').textContent    = 'v' + latest;
      document.getElementById('changelog').textContent    = meta.changelog ?? '–';
      const badge = document.getElementById('badge');
      if (newer) {
        badge.innerHTML = '<span class="material-icons">system_update</span> Update verfügbar';
        badge.className = 'badge update-available';
        const dl = document.getElementById('downloadBtn');
        dl.href = meta.apk; dl.download = appName + '-v' + latest + '.apk';
        dl.style.display = 'flex';
      } else {
        badge.innerHTML = '<span class="material-icons">check_circle</span> Aktuell';
        badge.className = 'badge up-to-date';
      }
    })
    .catch(err => {
      document.getElementById('loading').style.display  = 'none';
      document.getElementById('errorBox').style.display = 'block';
      document.getElementById('errorMsg').textContent   = err.message;
    });
}());
</script>
</body>
</html>
